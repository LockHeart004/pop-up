<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vivaldi Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body onload="verifierAcces()">

    <div id="app">
        <div id="hide-screen"></div>

        <header>
            <span>Pop-Up Chat</span>
            <button id="btn-toggle-view" onclick="basculerAffichage()">🔒</button>
        </header>

        <div id="zone-pseudo">
            <input type="text" id="pseudo-input" placeholder="Identifiant de session...">
            <button onclick="definirPseudo()">REJOINDRE</button>
        </div>

        <div id="zone-chat" style="display:none;">
            <div id="notif-mention">⚠️ MENTION ! <button onclick="lireMention()">OK</button></div>
            <div id="messages-display"></div>
            
            <div id="admin-panel">
                <div class="admin-tools-row">
                    <input type="color" id="color-picker" onchange="changerTheme(this.value)">
                    <button class="btn-danger" onclick="nettoyerSalon()">TOUT VIDER</button>
                </div>
            </div>

            <div class="input-area">
                <input type="text" id="msg-input" placeholder="Écrire un message...">
                <button onclick="envoyerMessage()">OK</button>
            </div>
        </div>

        <div id="btn-admin-secret" onclick="accesAdmin()"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
